<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Second Brain 六号機</title>
<style>
body{font-family:sans-serif;background:#eef4ff;max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:16px;margin:12px 0}
textarea{width:100%;height:48px;resize:none;padding:12px;box-sizing:border-box}
button{background:#0a7cff;color:#fff;border:none;border-radius:12px;padding:12px 18px}
</style></head>
<body>
<h1>🧠 Second Brain</h1>
<div class="card">
<textarea id="memoInput" placeholder="メモを入力"></textarea>
<button>＋</button>
<div style="margin-top:10px"><button>🔍 フィルター</button></div>
</div>
<div><button onclick="location.href='folder.html'">📁 フォルダを見る</button></div>
<div id="memoList" class="card">メモ一覧</div>
<input placeholder="検索" style="width:100%;padding:12px;box-sizing:border-box">
<script>
const t=document.getElementById('memoInput');
t.addEventListener('input',()=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});
</script>
</body></html>
