<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモPWA Sync</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#f2f2f7}
.container{max-width:700px;margin:auto;padding:20px}
.memo{background:#fff;padding:12px;border-radius:12px;margin-top:10px;position:relative}
.delete{position:absolute;right:10px;top:10px;cursor:pointer}
input,button{padding:10px}
#memoInput{width:70%}
</style>
</head>
<body>
<div class="container">
<h1>メモPWA Sync</h1>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none">ログアウト</button>
<p id="userInfo"></p>

<input id="memoInput" placeholder="メモ">
<button id="addBtn">追加</button>

<input id="searchInput" placeholder="検索" style="display:block;width:100%;margin-top:10px">

<div id="memoList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
 getAuth,GoogleAuthProvider,signInWithPopup,
 signOut,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
 getFirestore,collection,addDoc,
 getDocs,deleteDoc,doc,query,orderBy
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyALRTOJ0RectT5UFjKh01sTc-Wql9uYSpk",
 authDomain:"second-brain-b63e3.firebaseapp.com",
 projectId:"second-brain-b63e3",
 storageBucket:"second-brain-b63e3.firebasestorage.app",
 messagingSenderId:"568440402215",
 appId:"1:568440402215:web:a2ac2733a541fea7ccf902"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let memos=[];

async function loadMemos(){
 if(!currentUser) return;
 const q=query(collection(db,"users",currentUser.uid,"memos"));
 const snap=await getDocs(q);
 memos=[];
 snap.forEach(d=>memos.push({id:d.id,...d.data()}));
 memos.sort((a,b)=>(b.created||0)-(a.created||0));
 renderMemos();
}

async function addMemo(){
 const text=document.getElementById("memoInput").value.trim();
 if(!text || !currentUser) return;

 await addDoc(
   collection(db,"users",currentUser.uid,"memos"),
   {text:text,created:Date.now()}
 );

 document.getElementById("memoInput").value="";
 await loadMemos();
}

async function deleteMemo(id){
 if(!confirm("削除しますか？")) return;
 await deleteDoc(doc(db,"users",currentUser.uid,"memos",id));
 await loadMemos();
}

function renderMemos(){
 const search=document.getElementById("searchInput").value.toLowerCase();
 const list=document.getElementById("memoList");
 list.innerHTML="";

 memos.filter(m=>m.text.toLowerCase().includes(search))
 .forEach(m=>{
   const div=document.createElement("div");
   div.className="memo";
   div.innerHTML=`
     <span class="delete">🗑️</span>
     <div>${m.text}</div>
   `;
   div.querySelector(".delete").onclick=()=>deleteMemo(m.id);
   list.appendChild(div);
 });
}

document.getElementById("addBtn").onclick=addMemo;
document.getElementById("searchInput").oninput=renderMemos;

document.getElementById("loginBtn").onclick=async()=>{
 await signInWithPopup(auth,provider);
};

document.getElementById("logoutBtn").onclick=async()=>{
 await signOut(auth);
};

onAuthStateChanged(auth,async(user)=>{
 const loginBtn=document.getElementById("loginBtn");
 const logoutBtn=document.getElementById("logoutBtn");
 const userInfo=document.getElementById("userInfo");

 if(user){
   currentUser=user;
   loginBtn.style.display="none";
   logoutBtn.style.display="inline-block";
   userInfo.textContent="こんにちは "+user.displayName+" さん";
   await loadMemos();
 }else{
   currentUser=null;
   memos=[];
   renderMemos();
   loginBtn.style.display="inline-block";
   logoutBtn.style.display="none";
   userInfo.textContent="";
 }
});
</script>
</body>
</html>
