<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain</title>
<style>
:root{--bg:#eef4ff;--panel:#fff;--panel-2:#f8fbff;--line:#dfe6f3;--text:#182033;--muted:#6b7280;--blue:#007aff;--blue-soft:#e7f1ff;--danger:#d92d20;--favorite:#fff7d6}
:root[data-theme="dark"]{--bg:#111827;--panel:#1f2937;--panel-2:#111827;--line:#374151;--text:#f9fafb;--muted:#a7b0c0;--blue:#58a6ff;--blue-soft:#183554;--favorite:#403814}
@media(prefers-color-scheme:dark){:root[data-theme="system"]{--bg:#111827;--panel:#1f2937;--panel-2:#111827;--line:#374151;--text:#f9fafb;--muted:#a7b0c0;--blue:#58a6ff;--blue-soft:#183554;--favorite:#403814}}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);min-height:100vh;color:var(--text)}
button,input,textarea,select{font:inherit}
button{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 14px;cursor:pointer}
button.secondary{background:#eef2f7;color:#182033}
:root[data-theme="dark"] button.secondary{background:#374151;color:#f9fafb}
button.danger{background:var(--danger)}
.container{max-width:940px;margin:auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
h1{text-align:center;margin:10px 0 18px;font-size:30px}
.userArea{position:relative}
#userMenuBtn{background:transparent;color:inherit;border:1px solid var(--line)}
#userMenu{display:none;position:absolute;top:44px;right:0;background:var(--panel);padding:10px;border:1px solid var(--line);border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.16);z-index:1000;min-width:200px}
#userMenu button,#userMenu select{display:block;width:100%;margin-top:6px}
.top-card,.memo{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.06)}
.top-card{padding:18px;margin-bottom:16px}
.inputRow{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
#memoInput{flex:1;min-width:240px;height:78px;resize:none;overflow:hidden}
textarea,input,select{border:1px solid var(--line);border-radius:10px;padding:11px;background:var(--panel);color:var(--text)}
.notifyBox{display:flex;align-items:center;gap:6px;padding:10px 0}
#notifyTime{margin-top:10px;width:260px}
.fileArea{margin-top:12px;padding:12px;border:1px dashed #9db2cf;border-radius:10px;background:var(--panel-2)}
.fileControls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#fileInput{display:none}
.plusBtn{width:38px;height:38px;padding:0;border-radius:50%;font-size:22px;line-height:1}
.fileList{margin-top:8px;color:var(--muted);font-size:14px}
.fileChip{display:inline-flex;align-items:center;gap:6px;background:var(--blue-soft);color:var(--text);border-radius:999px;padding:5px 9px;margin:4px 6px 0 0}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
#searchInput{display:block;width:100%;margin-top:16px}
.memo{padding:16px;margin-top:12px;position:relative;word-break:break-word}
.memo.favorite{background:var(--favorite)}
.memoActions{position:absolute;right:12px;top:12px;display:flex;gap:8px}
.iconBtn{background:#eef2f7;color:#182033;min-width:34px;height:34px;padding:0 8px;border-radius:8px}
.memoText{padding-right:168px;white-space:pre-wrap;line-height:1.55}
.tags{margin-top:8px;color:var(--blue)}
.tagTree{display:grid;gap:4px;margin-top:8px}
.tagNode{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:var(--panel-2)}
.tagNode input{padding:0}
.attachments{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.attachment{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--text);text-decoration:none;font-size:13px}
.status{color:var(--muted);font-size:13px;margin-top:8px}
progress{width:220px;max-width:100%;height:10px}
@media(max-width:640px){.topbar{flex-direction:column}.memoText{padding-right:0;padding-top:44px}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <button onclick="location.href='folder.html'">フォルダを見る</button>
    <div class="userArea">
      <button id="userMenuBtn">ゲスト ▾</button>
      <div id="userMenu">
        <button id="menuNotifyBtn" class="secondary">通知を許可</button>
        <label class="status">テーマ</label>
        <select id="themeSelect">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <button id="loginBtn">ログイン</button>
        <button id="logoutBtn" class="danger" style="display:none">ログアウト</button>
      </div>
    </div>
  </div>

  <h1>Second Brain</h1>

  <div class="top-card">
    <div class="inputRow">
      <textarea id="memoInput" placeholder="メモを入力。#タグ を付けるとフォルダ表示されます。スペース入りタグは _ に変換されます。"></textarea>
      <label class="notifyBox"><input type="checkbox" id="notifyCheck">通知</label>
      <button id="addBtn">追加</button>
    </div>
    <input type="datetime-local" id="notifyTime" style="display:none;">

    <div class="fileArea">
      <div class="fileControls">
        <button id="chooseFileBtn" class="plusBtn secondary" title="ファイルを添付">+</button>
        <span class="status">選択後だけファイル名を表示します。</span>
      </div>
      <input type="file" id="fileInput" multiple>
      <div id="selectedFiles" class="fileList"></div>
      <div id="uploadStatus" class="status"></div>
      <progress id="uploadProgress" value="0" max="100" style="display:none"></progress>
    </div>

    <div class="toolbar">
      <button id="filterBtn" class="secondary">タグフィルター</button>
      <label class="notifyBox"><input type="checkbox" id="favoriteOnly">お気に入りのみ</label>
    </div>
    <div id="filterPanel" style="display:none;margin-top:10px"></div>
  </div>

  <div id="memoList"></div>
  <input id="searchInput" placeholder="検索">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,query,updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getStorage,ref,uploadBytesResumable,getDownloadURL,deleteObject } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

const firebaseConfig={apiKey:"AIzaSyALRTOJ0RectT5UFjKh01sTc-Wql9uYSpk",authDomain:"second-brain-b63e3.firebaseapp.com",projectId:"second-brain-b63e3",storageBucket:"second-brain-b63e3.firebasestorage.app",messagingSenderId:"568440402215",appId:"1:568440402215:web:a2ac2733a541fea7ccf902"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let memos=[];
let selectedFiles=[];
let selectedTags=[];

function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem("sb_theme",theme);}
applyTheme(localStorage.getItem("sb_theme")||"system");
document.getElementById("themeSelect").value=localStorage.getItem("sb_theme")||"system";
document.getElementById("themeSelect").onchange=e=>applyTheme(e.target.value);

function normalizeTagName(tag){
 return String(tag||"").replace(/^#+/,"").trim().replace(/\s+/g,"_").replace(/[\\/:*?"<>|#%{}^~[\]`]/g,"_");
}
function parseTags(text){
 const tags=[];
 const matches=String(text||"").matchAll(/#([^\n#]+)/g);
 for(const match of matches){
   const tag=normalizeTagName(match[1]);
   if(tag && !tags.includes(tag)) tags.push(tag);
 }
 return tags;
}
function buildMemoText(body,tags){
 const cleanBody=String(body||"").trim();
 const cleanTags=[...new Set((tags||[]).map(normalizeTagName).filter(Boolean))];
 return [cleanBody, cleanTags.map(tag=>"#"+tag).join(" ")].filter(Boolean).join("\n");
}
function renameTag(tags,oldTag,newTag){
 const oldName=normalizeTagName(oldTag);
 const nextName=normalizeTagName(newTag);
 return [...new Set((tags||[]).map(tag=>normalizeTagName(tag)===oldName?nextName:normalizeTagName(tag)).filter(Boolean))];
}
function splitMemoText(text){
 const tags=parseTags(text);
 let body=String(text||"");
 for(const tag of tags){
   body=body.replace(new RegExp(`#${escapeRegExp(tag)}(?=$|\\s|\\n)`,"g"),"");
 }
 body=body.replace(/#([^\n#]+)/g,"").replace(/[ \t]+\n/g,"\n").trim();
 return {body,tags};
}
function replaceTagInMemo(text,oldTag,newTag){
 const parsed=splitMemoText(text);
 return buildMemoText(parsed.body,renameTag(parsed.tags,oldTag,newTag));
}
function escapeRegExp(value){return String(value).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function normalizeMemoInput(text){
 const parsed=splitMemoText(text);
 return buildMemoText(parsed.body,parsed.tags);
}
function visibleText(text){return splitMemoText(text).body;}
function safeFileName(name){return name.replace(/[\\/:*?"<>|#%{}^~[\]`]/g,"_").slice(0,120);}
function formatBytes(bytes){if(!bytes)return"0 B";const units=["B","KB","MB","GB"];let v=bytes,i=0;while(v>=1024&&i<units.length-1){v/=1024;i++;}return`${v.toFixed(i?1:0)} ${units[i]}`;}

function renderSelectedFiles(){
 const box=document.getElementById("selectedFiles");
 box.innerHTML=selectedFiles.map(file=>`<span class="fileChip">${file.name} / ${formatBytes(file.size)}</span>`).join("");
}

function uploadTaskWithTimeout(fileRef,file,metadata,timeoutMs=120000){
 return new Promise((resolve,reject)=>{
   const task=uploadBytesResumable(fileRef,file,metadata);
   const timer=setTimeout(()=>{
     task.cancel();
     reject(new Error(`${file.name} のアップロードがタイムアウトしました。Storageルールや通信状態を確認してください。`));
   },timeoutMs);
   task.on("state_changed",snapshot=>{
     const pct=Math.round((snapshot.bytesTransferred/snapshot.totalBytes)*100);
     const progress=document.getElementById("uploadProgress");
     progress.style.display="block";
     progress.value=pct;
     document.getElementById("uploadStatus").textContent=`アップロード中: ${file.name} ${pct}%`;
   },error=>{
     clearTimeout(timer);
     reject(error);
   },()=>{
     clearTimeout(timer);
     resolve(task.snapshot);
   });
 });
}

async function uploadSelectedFiles(memoIdSeed){
 const attachments=[];
 for(const file of selectedFiles){
   const path=`users/${currentUser.uid}/attachments/${memoIdSeed}/${crypto.randomUUID()}_${safeFileName(file.name)}`;
   const fileRef=ref(storage,path);
   await uploadTaskWithTimeout(fileRef,file,{contentType:file.type||"application/octet-stream"});
   const url=await getDownloadURL(fileRef);
   attachments.push({name:file.name,type:file.type||"application/octet-stream",size:file.size,path,url,uploadedAt:Date.now()});
 }
 return attachments;
}

async function loadMemos(){
 if(!currentUser) return;
 const snap=await getDocs(query(collection(db,"users",currentUser.uid,"memos")));
 memos=[];
 snap.forEach(d=>memos.push({id:d.id,...d.data()}));
 memos.sort((a,b)=>(Number(b.favorite||b.pinned)-Number(a.favorite||a.pinned))||((b.created||0)-(a.created||0)));
 renderMemos();
}

async function addMemo(){
 const rawText=document.getElementById("memoInput").value.trim();
 const text=normalizeMemoInput(rawText);
 const notify=document.getElementById("notifyCheck").checked;
 const notifyTime=document.getElementById("notifyTime").value;
 if(!currentUser){alert("先にログインしてください。");return;}
 if(!text && selectedFiles.length===0) return;
 document.getElementById("addBtn").disabled=true;
 try{
   const seed=String(Date.now());
   const attachments=await uploadSelectedFiles(seed);
   await addDoc(collection(db,"users",currentUser.uid,"memos"),{text,created:Date.now(),updatedAt:Date.now(),notify,notifyTime,pinned:false,favorite:false,attachments});
   document.getElementById("memoInput").value="";
   document.getElementById("memoInput").style.height="78px";
   document.getElementById("fileInput").value="";
   selectedFiles=[];
   renderSelectedFiles();
   document.getElementById("uploadStatus").textContent="";
   document.getElementById("uploadProgress").style.display="none";
   await loadMemos();
 }catch(error){
   console.error(error);
   document.getElementById("uploadStatus").textContent=error.message||"保存に失敗しました。";
   alert(error.message||"保存に失敗しました。Firebase Storageの設定を確認してください。");
 }finally{
   document.getElementById("addBtn").disabled=false;
 }
}

async function deleteMemo(id){
 if(!confirm("このメモを削除しますか？")) return;
 const memo=memos.find(item=>item.id===id);
 await deleteDoc(doc(db,"users",currentUser.uid,"memos",id));
 if(memo?.attachments?.length){
   await Promise.allSettled(memo.attachments.filter(file=>file.path).map(file=>deleteObject(ref(storage,file.path))));
 }
 await loadMemos();
}
async function toggleFavorite(id,current){
 await updateDoc(doc(db,"users",currentUser.uid,"memos",id),{favorite:!current,pinned:!current,updatedAt:Date.now()});
 await loadMemos();
}
async function editMemo(id,text){
 const next=prompt("メモを編集",text);
 if(next===null) return;
 await updateDoc(doc(db,"users",currentUser.uid,"memos",id),{text:normalizeMemoInput(next),updatedAt:Date.now()});
 await loadMemos();
}

function buildTagTree(tags){
 const root={children:{}};
 tags.forEach(tag=>{
   const parts=tag.replace(/^#/,"").split("/").map(normalizeTagName).filter(Boolean);
   let node=root;
   parts.forEach(part=>{node.children[part]??={children:{},full:parts.slice(0,parts.indexOf(part)+1).join("/")};node=node.children[part];});
 });
 return root;
}
function renderTagNodes(node,depth=0){
 return Object.keys(node.children).sort().map(name=>{
   const child=node.children[name];
   const full=collectFullTag(child,name,node);
   const checked=selectedTags.includes("#"+full)?"checked":"";
   return `<label class="tagNode" style="margin-left:${depth*14}px"><input type="checkbox" value="#${full}" ${checked}> ${name}</label>${renderTagNodes(child,depth+1)}`;
 }).join("");
}
function collectFullTag(){return arguments[1];}
function renderTags(){
 const panel=document.getElementById("filterPanel");
 const tags=[...new Set(memos.flatMap(m=>parseTags(m.text||"").map(t=>"#"+t)))].sort();
 panel.innerHTML=tags.length?`<div class="tagTree">${renderTagNodes(buildTagTree(tags))}</div>`:"<div class='status'>タグ付きメモはありません。</div>";
 panel.querySelectorAll("input").forEach(c=>{
   c.onchange=()=>{selectedTags=[...panel.querySelectorAll("input:checked")].map(v=>v.value);renderMemos();};
 });
}

function renderMemos(){
 const search=document.getElementById("searchInput").value.toLowerCase();
 const favoriteOnly=document.getElementById("favoriteOnly").checked;
 const list=document.getElementById("memoList");
 list.innerHTML="";
 renderTags();
 memos.filter(m=>!favoriteOnly || m.favorite || m.pinned)
 .filter(m=>(m.text||"").toLowerCase().includes(search) || (m.attachments||[]).some(file=>file.name.toLowerCase().includes(search)))
 .filter(m=>selectedTags.length===0 || selectedTags.every(t=>parseTags(m.text||"").map(x=>"#"+x).includes(t)))
 .forEach(m=>{
   const div=document.createElement("div");
   div.className="memo"+(m.favorite||m.pinned?" favorite":"");
   const tags=parseTags(m.text||"").map(t=>"#"+t);
   const attachments=m.attachments||[];
   div.innerHTML=`
     <div class="memoActions">
       <button class="iconBtn editBtn" title="編集">編集</button>
       <button class="iconBtn pinBtn" title="お気に入り">${m.favorite||m.pinned?"★":"☆"}</button>
       <button class="iconBtn deleteBtn" title="削除">削除</button>
     </div>
     <div class="memoText">${escapeHtml(visibleText(m.text)||"(本文なし)")}</div>
     ${tags.length?`<div class="tags">${tags.map(escapeHtml).join(" ")}</div>`:""}
     ${m.notify && m.notifyTime ? `<div class="status">通知 ${m.notifyTime.replace("T"," ").split("-").join("/")}</div>` : ""}
     ${attachments.length?`<div class="attachments">${attachments.map(file=>`<a class="attachment" href="${file.url}" target="_blank" rel="noopener">${escapeHtml(file.name)} / ${formatBytes(file.size)}</a>`).join("")}</div>`:""}
   `;
   div.querySelector(".deleteBtn").onclick=()=>deleteMemo(m.id);
   div.querySelector(".pinBtn").onclick=()=>toggleFavorite(m.id,!!(m.favorite||m.pinned));
   div.querySelector(".editBtn").onclick=()=>editMemo(m.id,m.text||"");
   list.appendChild(div);
 });
}
function escapeHtml(value){return String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));}

document.getElementById("addBtn").onclick=addMemo;
document.getElementById("searchInput").oninput=renderMemos;
document.getElementById("favoriteOnly").onchange=renderMemos;
document.getElementById("chooseFileBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{selectedFiles=[...e.target.files];renderSelectedFiles();};
document.getElementById("filterBtn").onclick=()=>{const panel=document.getElementById("filterPanel");panel.style.display=panel.style.display==="none"?"block":"none";};
document.getElementById("notifyCheck").onchange=()=>{document.getElementById("notifyTime").style.display=document.getElementById("notifyCheck").checked?"block":"none";};
document.getElementById("loginBtn").onclick=()=>signInWithPopup(auth,provider);
document.getElementById("logoutBtn").onclick=()=>signOut(auth);
document.getElementById("menuNotifyBtn").onclick=async()=>{const permission=await Notification.requestPermission();alert(permission==="granted"?"通知を許可しました。":"通知は許可されませんでした。");};
document.getElementById("userMenuBtn").onclick=()=>{const menu=document.getElementById("userMenu");menu.style.display=menu.style.display==="block"?"none":"block";};

const memoInput=document.getElementById("memoInput");
memoInput.addEventListener("input",()=>{memoInput.style.height="78px";memoInput.style.height=memoInput.scrollHeight+"px";});

onAuthStateChanged(auth,async(user)=>{
 const loginBtn=document.getElementById("loginBtn");
 const logoutBtn=document.getElementById("logoutBtn");
 const userInfo=document.getElementById("userMenuBtn");
 if(user){
   currentUser=user;
   loginBtn.style.display="none";
   logoutBtn.style.display="block";
   userInfo.textContent=`${user.displayName||"ログイン中"} ▾`;
   await loadMemos();
 }else{
   currentUser=null;
   memos=[];
   renderMemos();
   loginBtn.style.display="block";
   logoutBtn.style.display="none";
   userInfo.textContent="ゲスト ▾";
 }
});
</script>
<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}
</script>
</body>
</html>
