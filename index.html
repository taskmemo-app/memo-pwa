<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモPWA</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    margin:0;
    background:#f2f2f7;
    color:#000;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.login-area{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#007aff;
    color:white;
    cursor:pointer;
}

#logoutBtn{
    background:#ff3b30;
}

.input-area{
    display:flex;
    gap:10px;
}

#memoInput{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
}

#searchInput{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:12px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.memo{
    background:white;
    margin-top:12px;
    padding:14px;
    border-radius:14px;
    position:relative;
}

.delete{
    position:absolute;
    right:12px;
    top:12px;
    cursor:pointer;
}

.date{
    color:gray;
    font-size:12px;
    margin-top:8px;
}

@media (prefers-color-scheme: dark){

body{
    background:#000;
    color:#fff;
}

.memo{
    background:#1c1c1e;
}

#memoInput,#searchInput{
    background:#1c1c1e;
    color:white;
    border:1px solid #333;
}
}
</style>

</head>

<body>

<div class="container">

<h1>メモPWA</h1>

<div class="login-area">
    <button id="loginBtn">Googleログイン</button>
    <button id="logoutBtn" style="display:none;">ログアウト</button>
    <p id="userInfo"></p>
</div>

<p id="count">0件</p>

<div class="input-area">
    <input id="memoInput" placeholder="メモを入力">
    <button onclick="addMemo()">追加</button>
</div>

<input id="searchInput" placeholder="検索..." oninput="renderMemos()">

<div id="memoList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
 getAuth,
 GoogleAuthProvider,
 signInWithPopup,
 signOut,
 onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALRTOJ0RectT5UFjKh01sTc-Wql9uYSpk",
  authDomain: "second-brain-b63e3.firebaseapp.com",
  projectId: "second-brain-b63e3",
  storageBucket: "second-brain-b63e3.firebasestorage.app",
  messagingSenderId: "568440402215",
  appId: "1:568440402215:web:a2ac2733a541fea7ccf902"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.memos =
JSON.parse(localStorage.getItem("memos") || "[]");

window.saveMemos = function(){
 localStorage.setItem(
  "memos",
  JSON.stringify(window.memos)
 );
}

window.addMemo = function(){

 const input =
 document.getElementById("memoInput");

 const text =
 input.value.trim();

 if(!text) return;

 window.memos.unshift({
  text:text,
  date:new Date().toLocaleString()
 });

 saveMemos();

 input.value="";

 renderMemos();
}

window.deleteMemo = function(index){

 if(!confirm("削除しますか？"))
 return;

 window.memos.splice(index,1);

 saveMemos();

 renderMemos();
}

window.renderMemos = function(){

 const list =
 document.getElementById("memoList");

 const search =
 document.getElementById("searchInput")
 .value.toLowerCase();

 document.getElementById("count")
 .textContent =
 window.memos.length + "件";

 const filtered =
 window.memos.filter(m =>
  m.text.toLowerCase()
  .includes(search)
 );

 list.innerHTML="";

 filtered.forEach((memo)=>{

  const realIndex =
  window.memos.indexOf(memo);

  const div =
  document.createElement("div");

  div.className="memo";

  div.innerHTML=`
   <span class="delete"
   onclick="deleteMemo(${realIndex})">
   🗑️
   </span>

   <div>${memo.text}</div>

   <div class="date">
   ${memo.date}
   </div>
  `;

  list.appendChild(div);
 });
}

document
.getElementById("memoInput")
.addEventListener("keydown",(e)=>{
 if(e.key==="Enter"){
  addMemo();
 }
});

document
.getElementById("loginBtn")
.addEventListener("click",async()=>{

 try{

  await signInWithPopup(
   auth,
   provider
  );

 }catch(err){

  alert(err.message);

 }

});

document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{

 await signOut(auth);

});

onAuthStateChanged(auth,(user)=>{

 const loginBtn =
 document.getElementById("loginBtn");

 const logoutBtn =
 document.getElementById("logoutBtn");

 const userInfo =
 document.getElementById("userInfo");

 if(user){

  loginBtn.style.display="none";

  logoutBtn.style.display=
  "inline-block";

  userInfo.textContent=
  "こんにちは "
  + user.displayName
  + " さん";

 }else{

  loginBtn.style.display=
  "inline-block";

  logoutBtn.style.display=
  "none";

  userInfo.textContent="";

 }

});

renderMemos();

</script>

</body>
</html>
