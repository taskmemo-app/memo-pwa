<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモPWA Sync</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:linear-gradient(180deg,#eef4ff,#f8f9ff);min-height:100vh}
.container{max-width:800px;margin:auto;padding:20px}
h1{text-align:center}
.top-card,.memo{background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.top-card{padding:18px;margin-bottom:16px}
.memo{padding:16px;padding-right:100px;margin-top:12px;position:relative;word-break:break-word}
.delete{position:absolute;right:12px;top:12px;cursor:pointer}
.inputRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
#memoInput{flex:1;min-width:120px}
#searchInput{width:100%;box-sizing:border-box;margin-top:12px}
input,button{padding:12px;border-radius:12px;border:1px solid #dfe3ea}
button{background:#007aff;color:#fff;border:none}
.notifyBox{display:flex;align-items:center;gap:6px}
#notifyTime{margin-top:10px;width:260px}
@media (prefers-color-scheme: dark){
body{background:#111827;color:#fff}
.top-card,.memo{background:#1f2937;color:#fff}
input{background:#111827;color:#fff}
}
</style>

</head>
<body>
<div class="container">
<div style="display:flex;justify-content:flex-end;position:relative;margin-bottom:10px;">
<button id="userMenuBtn" style="background:none;color:inherit;border:none;">👤 ゲスト ▼</button>
<div id="userMenu" style="display:none;position:absolute;top:40px;right:0;background:white;padding:10px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:1000;">
<button id="menuNotifyBtn" style="display:block;width:100%;margin-bottom:6px;">🔔 通知設定</button>
<button id="loginBtn" style="display:block;width:100%;">🔑 ログイン</button>
<button id="logoutBtn" style="display:none;width:100%;">🚪 ログアウト</button>
</div>
</div>
<h1>🧠 Second Brain</h1><div class="top-card">

<div class="inputRow">
<input id="memoInput" placeholder="メモを入力">
<label class="notifyBox"><input type="checkbox" id="notifyCheck">🔔</label>
<button id="addBtn">＋</button>
</div>
<input type="datetime-local" id="notifyTime" style="display:none;">

<input id="searchInput" placeholder="検索" style="display:block;width:100%;margin-top:10px"><div id="tagBar" style="margin-top:10px;"></div>



</div><div id="memoList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
 getAuth,GoogleAuthProvider,signInWithPopup,
 signOut,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
 getFirestore,collection,addDoc,
 getDocs,deleteDoc,doc,query,orderBy,updateDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyALRTOJ0RectT5UFjKh01sTc-Wql9uYSpk",
 authDomain:"second-brain-b63e3.firebaseapp.com",
 projectId:"second-brain-b63e3",
 storageBucket:"second-brain-b63e3.firebasestorage.app",
 messagingSenderId:"568440402215",
 appId:"1:568440402215:web:a2ac2733a541fea7ccf902"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let memos=[];

async function loadMemos(){
 if(!currentUser) return;
 const q=query(collection(db,"users",currentUser.uid,"memos"));
 const snap=await getDocs(q);
 memos=[];
 snap.forEach(d=>memos.push({id:d.id,...d.data()}));
 memos.sort((a,b)=>(Number(b.pinned)-Number(a.pinned))||((b.created||0)-(a.created||0)));
 renderMemos();
}

async function addMemo(){
 
 const text=document.getElementById("memoInput").value.trim();
 const notify=document.getElementById("notifyCheck").checked;
 const notifyTime=document.getElementById("notifyTime").value;

 if(!text || !currentUser) return;

 await addDoc(
   collection(db,"users",currentUser.uid,"memos"),
   {text:text,created:Date.now(),notify:notify,notifyTime:notifyTime,pinned:false}
 );

 document.getElementById("memoInput").value="";
 await loadMemos();
}

async function deleteMemo(id){
 if(!confirm("削除しますか？")) return;
 await deleteDoc(doc(db,"users",currentUser.uid,"memos",id));
 await loadMemos();
}


async function togglePin(id,current){
 await updateDoc(doc(db,'users',currentUser.uid,'memos',id),{pinned:!current});
 await loadMemos();
}

async function editMemo(id,text){
 const newText=prompt('メモを編集',text);
 if(!newText) return;
 await updateDoc(doc(db,'users',currentUser.uid,'memos',id),{text:newText});
 await loadMemos();
}


let selectedTag='';

function extractTags(text){
 return [...new Set((text.match(/#\S+/g)||[]))];
}

function renderTags(){
 const tagBar=document.getElementById('tagBar');
 const tags=[...new Set(memos.flatMap(m=>extractTags(m.text)))].sort();
 tagBar.innerHTML='<button data-tag="">すべて</button> '+tags.map(t=>`<button data-tag="${t}">${t}</button>`).join(' ');
 tagBar.querySelectorAll('button').forEach(btn=>{
   btn.onclick=()=>{selectedTag=btn.dataset.tag; renderMemos();};
 });
}

function renderMemos(){
 const search=document.getElementById("searchInput").value.toLowerCase();
 const list=document.getElementById("memoList");
 list.innerHTML="";
 renderTags();

 memos.filter(m=>m.text.toLowerCase().includes(search))
 .filter(m=>!selectedTag || extractTags(m.text).includes(selectedTag))
 .forEach(m=>{
   const div=document.createElement("div");
   div.className="memo";
   div.innerHTML=`
     <span class="delete">🗑️</span>
     <span class="pinBtn" style="position:absolute;right:45px;top:12px;cursor:pointer;">${m.pinned?'📌':'📍'}</span>
     <span class="editBtn" style="position:absolute;right:75px;top:12px;cursor:pointer;">📝</span>
     <div>${m.text.replace(/#\S+/g,'').trim()}</div><div style='margin-top:6px;color:#007aff;'>${extractTags(m.text).join(' ')}</div>
     ${m.notify && m.notifyTime ? `<div style='color:#ff9500;margin-top:6px;'>🔔 ${m.notifyTime.replace('T',' ').replaceAll('-','/')}</div>` : ``}
   `;
   div.querySelector(".delete").onclick=()=>deleteMemo(m.id);
   div.querySelector(".pinBtn").onclick=()=>togglePin(m.id,m.pinned);
   div.querySelector(".editBtn").onclick=()=>editMemo(m.id,m.text);
   list.appendChild(div);
 });
}

document.getElementById("addBtn").onclick=addMemo;
document.getElementById("searchInput").oninput=renderMemos;

document.getElementById("notifyCheck").addEventListener("change",()=>{
 const t=document.getElementById("notifyTime");
 t.style.display=document.getElementById("notifyCheck").checked ? "block" : "none";
});

document.getElementById("loginBtn").onclick=async()=>{
 await signInWithPopup(auth,provider);
};

document.getElementById("logoutBtn").onclick=async()=>{
 await signOut(auth);
};

async function setupNotifications(){
 if(!('Notification' in window)) return;

 const btn=document.getElementById('enableNotificationsBtn');
 const status=document.getElementById('notificationStatus');

 function refresh(){
   if(Notification.permission==='granted'){
      btn.style.display='none';
      status.style.display='inline';
   }
 }
 refresh();

 btn?.addEventListener('click', async ()=>{
   const p=await Notification.requestPermission();
   if(p==='granted'){
      refresh();
      alert('通知が有効になりました');
   }
 });
}
setupNotifications();



const userMenuBtn=document.getElementById('userMenuBtn');
const userMenu=document.getElementById('userMenu');
userMenuBtn.onclick=()=>{
 userMenu.style.display=userMenu.style.display==='block'?'none':'block';
};

document.getElementById('menuNotifyBtn').onclick=async()=>{
 if(!('Notification' in window)){ alert('通知非対応'); return; }
 const p=await Notification.requestPermission();
 if(p==='granted') alert('通知が有効になりました');
};

onAuthStateChanged(auth,async(user)=>{
 const loginBtn=document.getElementById("loginBtn");
 const logoutBtn=document.getElementById("logoutBtn");
 const userInfo=document.getElementById("userMenuBtn");

 if(user){
   currentUser=user;
   loginBtn.style.display="none"; logoutBtn.style.display="block";
   
   userInfo.textContent="👤 "+user.displayName+" ▼";
   await loadMemos();
 }else{
   currentUser=null;
   memos=[];
   renderMemos();
   loginBtn.style.display="block";
   logoutBtn.style.display="none";
   userInfo.textContent="👤 ゲスト ▼";
 }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
